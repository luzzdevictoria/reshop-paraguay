DESCRIPCION: Panel del vendedor. Tablas convertidas a tarjetas en móvil,
             botones táctiles grandes, pestañas responsivas.

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Vendedor - ReShop Paraguay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        :root {
            --primary: #2A5C6E;
            --secondary: #E8B86B;
            --accent: #D95A41;
            --bg: #f5f5f5;
            --white: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); }

        /* Header desktop */
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .header a { color: white; text-decoration: none; margin: 0 10px; transition: opacity 0.2s; }
        .header a:hover { opacity: 0.8; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Panel header */
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .panel-header h2 { color: var(--primary); font-size: 1.3rem; }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; font-weight: 500; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1e4452; }
        .btn-danger { background: var(--accent); color: white; }
        .btn-danger:hover { background: #c04a33; }
        .btn-secondary { background: var(--secondary); color: #333; }
        .btn-secondary:hover { background: #d4a050; }
        .btn i { margin-right: 6px; }

        /* Table (desktop) */
        .products-table { width: 100%; background: white; border-radius: 12px; overflow-x: auto; box-shadow: var(--shadow); }
        .products-table th, .products-table td { padding: 13px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .products-table th { background: var(--primary); color: white; }
        .products-table tr:last-child td { border-bottom: none; }
        .products-table tr:hover { background: #f9f9f9; }
        .product-image { width: 56px; height: 56px; object-fit: cover; border-radius: 10px; display: block; }
        .no-image { width: 56px; height: 56px; border-radius: 10px; background: #eee; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 1.4rem; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 12px; }
        .modal.is-open { display: flex; }
        .modal-content { background: white; padding: 28px; border-radius: 16px; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; }
        .modal-content h3 { color: var(--primary); margin-bottom: 20px; font-size: 1.1rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .image-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .image-preview img { width: 76px; height: 76px; object-fit: cover; border-radius: 10px; border: 2px solid var(--border); }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions .btn { flex: 1; }

        /* Status badge */
        .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
        .status-active { background: #d4edda; color: #155724; }
        .status-inactive { background: #f8d7da; color: #721c24; }
        .status-sold { background: #fff3cd; color: #856404; }

        /* Messages */
        .message { padding: 14px; border-radius: 10px; margin-top: 14px; font-size: 0.9rem; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .message.loading { background: #cce5ff; color: #004085; }

        /* Loading */
        .loading { text-align: center; padding: 50px; color: var(--text-light); }
        .loading i { font-size: 2rem; display: block; margin-bottom: 10px; color: var(--primary); }

        /* Footer */
        .footer { background: var(--primary); color: white; text-align: center; padding: 15px; margin-top: 30px; font-size: 0.8rem; }

        /* Stat cards (resumen rápido) */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-mini { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: var(--shadow); }
        .stat-mini__num { font-size: 1.6rem; font-weight: 700; color: var(--primary); }
        .stat-mini__label { font-size: 0.78rem; color: var(--text-light); margin-top: 4px; }

        /* Tablet */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- Header desktop -->
    <div class="header">
        <h1><i class="fas fa-tshirt"></i> ReShop Paraguay</h1>
        <p><i class="fas fa-chart-line"></i> Panel del Vendedor</p>
        <div style="margin-top: 10px;">
            <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
            <a href="cart.html"><i class="fas fa-shopping-bag"></i> Carrito</a>
            <a href="#" id="logoutBtnHeader"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
    </div>

    <div class="container">

        <!-- Stats rápidas -->
        <div class="stats-row" id="statsRow">
            <div class="stat-mini">
                <div class="stat-mini__num" id="statsTotal">—</div>
                <div class="stat-mini__label"><i class="fas fa-box"></i> Productos</div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini__num" id="statsActive">—</div>
                <div class="stat-mini__label"><i class="fas fa-check-circle"></i> Activos</div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini__num" id="statsSold">—</div>
                <div class="stat-mini__label"><i class="fas fa-shopping-cart"></i> Vendidos</div>
            </div>
        </div>

        <!-- Panel header con botón nuevo producto -->
        <div class="panel-header">
            <h2><i class="fas fa-boxes"></i> Mis Productos</h2>
            <button class="btn btn-primary" onclick="showCreateModal()">
                <i class="fas fa-plus"></i> Nuevo Producto
            </button>
        </div>

        <!-- Contenedor de productos -->
        <div id="productsContainer">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Cargando tus productos...</div>
        </div>

    </div>

    <!-- ========================================================
         MODAL: Crear / Editar Producto
    ========================================================= -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-tag"></i> Nuevo Producto</h3>
            <form id="productForm" enctype="multipart/form-data">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Título *</label>
                    <input type="text" id="title" required placeholder="Ej: Camisa de jean azul talle M">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="description" rows="3" placeholder="Estado, detalles, medidas..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Precio (Gs) *</label>
                        <input type="number" id="price" required placeholder="50000">
                    </div>
                    <div class="form-group">
                        <label>Talla</label>
                        <input type="text" id="size" placeholder="S, M, L...">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Categoría *</label>
                        <select id="category" required>
                            <option value="">Seleccionar</option>
                            <option value="pantalones">Pantalones</option>
                            <option value="camisas">Camisas</option>
                            <option value="vestidos">Vestidos</option>
                            <option value="chaquetas">Chaquetas</option>
                            <option value="calzado">Calzado</option>
                            <option value="accesorios">Accesorios</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="condition">
                            <option value="new_with_tags">Nuevo c/ etiqueta</option>
                            <option value="new_without_tags">Nuevo s/ etiqueta</option>
                            <option value="very_good">Muy bueno</option>
                            <option value="good">Bueno</option>
                            <option value="acceptable">Aceptable</option>
                        </select>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Marca</label>
                        <input type="text" id="brand" placeholder="Adidas, Nike...">
                    </div>
                    <div class="form-group">
                        <label>Color</label>
                        <input type="text" id="color" placeholder="Azul, Negro...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Imágenes del producto (máx. 5)</label>
                    <input type="file" id="images" multiple accept="image/jpeg,image/png,image/webp" style="padding: 8px;">
                    <div id="imagePreview" class="image-preview" style="margin-top: 10px;"></div>
                </div>
                <div id="modalMessage"></div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p><i class="fas fa-copyright"></i> 2026 ReShop Paraguay — Todos los derechos reservados</p>
        <p><i class="fas fa-user-tie"></i> Propietaria: Luciana Noelia Da Silva &nbsp;|&nbsp; <i class="fas fa-code"></i> Desarrollador: Pedro Jose Pirovani</p>
    </div>

    <script>
        const API_URL = 'https://reshop-backend.vercel.app';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!token || !user) window.location.href = 'login.html';

        // Cerrar sesión
        document.getElementById('logoutBtnHeader').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        // Preview de imágenes
        document.getElementById('images').addEventListener('change', function (e) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        // ── Cargar productos ──────────────────────────────────
        async function loadProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Cargando...</div>';

            try {
                const res = await fetch(`${API_URL}/api/products/seller/${user.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success && data.products?.length > 0) {
                    // Actualizar stats
                    document.getElementById('statsTotal').textContent = data.products.length;
                    document.getElementById('statsActive').textContent = data.products.filter(p => p.status === 'active').length;
                    document.getElementById('statsSold').textContent = data.products.filter(p => p.status === 'sold').length;

                    container.innerHTML = `
                        <div style="overflow-x:auto;">
                            <table class="products-table">
                                <thead>
                                    <tr>
                                        <th>Imagen</th>
                                        <th>Título</th>
                                        <th>Precio</th>
                                        <th>Categoría</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.products.map(p => `
                                        <tr>
                                            <td>
                                                ${p.images_urls?.[0]
                                                    ? `<img src="${p.images_urls[0]}" class="product-image" alt="${esc(p.title)}" loading="lazy">`
                                                    : `<div class="no-image"><i class="fas fa-image"></i></div>`
                                                }
                                            </td>
                                            <td><strong>${esc(p.title)}</strong></td>
                                            <td style="color: var(--accent); font-weight: 700;">${new Intl.NumberFormat('es-PY').format(p.price)} Gs</td>
                                            <td><span style="text-transform: capitalize;">${p.category}</span></td>
                                            <td>
                                                <span class="status-badge status-${p.status}">
                                                    ${p.status === 'active' ? '✅ Activo' : p.status === 'sold' ? '🏷️ Vendido' : '⏸️ Inactivo'}
                                                </span>
                                            </td>
                                            <td>
                                                <button class="btn btn-secondary" onclick="editProduct(${p.id})" style="margin-right: 6px;">
                                                    <i class="fas fa-edit"></i> Editar
                                                </button>
                                                <button class="btn btn-danger" onclick="deleteProduct(${p.id})">
                                                    <i class="fas fa-trash-alt"></i> Eliminar
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    document.getElementById('statsTotal').textContent = '0';
                    document.getElementById('statsActive').textContent = '0';
                    document.getElementById('statsSold').textContent = '0';
                    container.innerHTML = `
                        <div class="loading" style="background: white; border-radius: 12px; box-shadow: var(--shadow);">
                            <i class="fas fa-box-open"></i>
                            <p>No tienes productos aún.</p>
                            <button class="btn btn-primary" style="margin-top: 16px;" onclick="showCreateModal()">
                                <i class="fas fa-plus"></i> Publicar mi primer producto
                            </button>
                        </div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color: var(--accent);"><i class="fas fa-exclamation-triangle"></i><br>Error: ${err.message}</div>`;
            }
        }

        // ── Crear / editar ────────────────────────────────────
        function showCreateModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> Nuevo Producto';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('modalMessage').innerHTML = '';
            document.getElementById('productModal').classList.add('is-open');
        }

        async function editProduct(id) {
            try {
                const res = await fetch(`${API_URL}/api/products/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success || !data.product) return alert('No se pudo cargar el producto');
                const p = data.product;

                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Editar Producto';
                document.getElementById('productId').value = p.id;
                document.getElementById('title').value = p.title;
                document.getElementById('description').value = p.description || '';
                document.getElementById('price').value = p.price;
                document.getElementById('category').value = p.category;
                document.getElementById('size').value = p.size || '';
                document.getElementById('condition').value = p.condition || 'good';
                document.getElementById('brand').value = p.brand || '';
                document.getElementById('color').value = p.color || '';
                document.getElementById('modalMessage').innerHTML = '';

                const preview = document.getElementById('imagePreview');
                preview.innerHTML = '';
                p.images_urls?.forEach(url => {
                    const img = document.createElement('img');
                    img.src = url;
                    preview.appendChild(img);
                });

                document.getElementById('productModal').classList.add('is-open');
            } catch (err) {
                alert('Error al cargar: ' + err.message);
            }
        }

        async function deleteProduct(id) {
            if (!confirm('¿Eliminar este producto? Esta acción no se puede deshacer.')) return;
            try {
                const res = await fetch(`${API_URL}/api/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    loadProducts();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('is-open');
        }

        // Cerrar modal al hacer clic afuera
        document.getElementById('productModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        // ── Submit formulario ─────────────────────────────────
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const productId = document.getElementById('productId').value;
            const msgDiv = document.getElementById('modalMessage');
            msgDiv.className = 'message loading';
            msgDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Guardando...';

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value.trim());
            formData.append('description', document.getElementById('description').value.trim());
            formData.append('price', parseInt(document.getElementById('price').value));
            formData.append('category', document.getElementById('category').value);
            formData.append('size', document.getElementById('size').value.trim());
            formData.append('condition', document.getElementById('condition').value);
            formData.append('brand', document.getElementById('brand').value.trim());
            formData.append('color', document.getElementById('color').value.trim());
            const images = document.getElementById('images').files;
            for (let i = 0; i < images.length; i++) formData.append('images', images[i]);

            try {
                const url = productId ? `${API_URL}/api/products/${productId}` : `${API_URL}/api/products`;
                const method = productId ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    msgDiv.className = 'message success';
                    msgDiv.innerHTML = '<i class="fas fa-check-circle"></i> ¡Guardado correctamente!';
                    setTimeout(() => { closeModal(); loadProducts(); }, 1200);
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${data.error}`;
                }
            } catch (err) {
                msgDiv.className = 'message error';
                msgDiv.innerHTML = `<i class="fas fa-wifi"></i> Error de conexión: ${err.message}`;
            }
        });

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }

        // Inicializar
        loadProducts();
    </script>

    <!-- JS Móvil -->
    <script src="js/mobile.js"></script>

</body>
</html>
