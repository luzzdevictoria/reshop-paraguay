    <script>
        const API_URL = 'https://reshop-backend.vercel.app';
        let allProducts = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        let userLatitude = null;
        let userLongitude = null;
        let distanceEnabled = false;
        
        // ============================================================
        // TRADUCCIONES
        // ============================================================
        const translations = {
            es: {
                searchPlaceholder: "🔍 Buscar productos...",
                searchBtn: "Buscar",
                category: "Categoría",
                condition: "Estado",
                size: "Talla",
                minPrice: "Precio mínimo",
                maxPrice: "Precio máximo",
                origin: "Origen",
                distance: "Cerca de mí",
                clearFilters: "Limpiar filtros",
                noResults: "No se encontraron productos"
            },
            en: {
                searchPlaceholder: "🔍 Search products...",
                searchBtn: "Search",
                category: "Category",
                condition: "Condition",
                size: "Size",
                minPrice: "Min price",
                maxPrice: "Max price",
                origin: "Origin",
                distance: "Near me",
                clearFilters: "Clear filters",
                noResults: "No products found"
            },
            pt: {
                searchPlaceholder: "🔍 Buscar produtos...",
                searchBtn: "Buscar",
                category: "Categoria",
                condition: "Condição",
                size: "Tamanho",
                minPrice: "Preço mínimo",
                maxPrice: "Preço máximo",
                origin: "Origem",
                distance: "Perto de mim",
                clearFilters: "Limpar filtros",
                noResults: "Nenhum produto encontrado"
            }
        };
        
        let currentLang = localStorage.getItem('language') || 'es';
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            translatePage();
        }
        
        function translatePage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    if (el.tagName === 'INPUT' && el.placeholder) {
                        el.placeholder = translations[currentLang][key];
                    } else if (el.tagName === 'BUTTON') {
                        el.innerHTML = translations[currentLang][key];
                    } else {
                        el.innerHTML = translations[currentLang][key];
                    }
                }
            });
        }
        
        // ============================================================
        // GEOLOCALIZACIÓN
        // ============================================================
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLatitude = position.coords.latitude;
                        userLongitude = position.coords.longitude;
                        distanceEnabled = true;
                        document.getElementById('distanceGroup').style.display = 'block';
                        document.getElementById('enableDistanceBtn').style.display = 'none';
                        applyFilters();
                    },
                    (error) => {
                        let errorMsg = 'Error al obtener ubicación';
                        if (error.code === error.PERMISSION_DENIED) {
                            errorMsg = 'Permiso de ubicación denegado. Actívalo en la configuración de tu navegador.';
                        }
                        alert(errorMsg);
                    }
                );
            } else {
                alert('Tu navegador no soporta geolocalización');
            }
        }
        
        // ============================================================
        // AUTENTICACION
        // ============================================================
        function updateUserMenu() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const authLinks = document.getElementById('authLinks');
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            const dashboardLink = document.getElementById('dashboardLink');
            const adminLink = document.getElementById('adminLink');

            if (token && user) {
                authLinks.style.display = 'none';
                userMenu.style.display = 'inline-block';
                userName.innerHTML = user.full_name || user.email;
                if (dashboardLink && user.role === 'seller') dashboardLink.style.display = 'inline';
                if (adminLink && user.role === 'admin') adminLink.style.display = 'inline';
            } else {
                authLinks.style.display = 'inline';
                userMenu.style.display = 'none';
                if (dashboardLink) dashboardLink.style.display = 'none';
                if (adminLink) adminLink.style.display = 'none';
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('reshop_cart');
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                });
            }
        }
        
        // ============================================================
        // FILTROS
        // ============================================================
        function applyFilters() {
            currentPage = 1;
            renderProducts();
        }
        
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('conditionFilter').value = '';
            document.getElementById('sizeFilter').value = '';
            document.getElementById('minPriceFilter').value = '';
            document.getElementById('maxPriceFilter').value = '';
            document.getElementById('originFilter').value = '';
            applyFilters();
        }
        
        function getFilteredProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const condition = document.getElementById('conditionFilter').value;
            const size = document.getElementById('sizeFilter').value.toLowerCase();
            const minPrice = parseInt(document.getElementById('minPriceFilter').value) || 0;
            const maxPrice = parseInt(document.getElementById('maxPriceFilter').value) || Infinity;
            const origin = document.getElementById('originFilter').value;
            const maxDistance = distanceEnabled ? parseInt(document.getElementById('distanceFilter').value) : 0;
            
            return allProducts.filter(product => {
                if (searchTerm && !product.title.toLowerCase().includes(searchTerm)) return false;
                if (category && product.category !== category) return false;
                if (condition && product.condition !== condition) return false;
                if (size && !(product.size || '').toLowerCase().includes(size)) return false;
                if (product.price < minPrice) return false;
                if (product.price > maxPrice) return false;
                if (origin && product.origin !== origin) return false;
                if (distanceEnabled && maxDistance > 0 && userLatitude && product.seller_latitude && product.seller_longitude) {
                    const distance = calculateDistance(userLatitude, userLongitude, product.seller_latitude, product.seller_longitude);
                    if (distance > maxDistance) return false;
                }
                return true;
            });
        }
        
        // ============================================================
        // RENDERIZADO
        // ============================================================
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = getFilteredProducts();
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginatedProducts = filtered.slice(start, start + itemsPerPage);
            
            if (paginatedProducts.length === 0) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-box-open"></i> ${translations[currentLang].noResults}<br><br>¡Vuelve a intentarlo con otros filtros!</div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (const product of paginatedProducts) {
                const priceFormatted = new Intl.NumberFormat('es-PY').format(product.price);
                const conditionText = {
                    'new_with_tag': 'Nuevo con etiqueta',
                    'new_without_tag': 'Nuevo sin etiqueta',
                    'very_good': 'Muy bueno',
                    'good': 'Bueno',
                    'acceptable': 'Aceptable'
                }[product.condition] || product.condition;
                
                const originFlag = {
                    'PAR': '🇵🇾', 'USA': '🇺🇸', 'BRA': '🇧🇷', 'EU': '🇪🇺',
                    'CHN': '🇨🇳', 'JPN': '🇯🇵', 'KOR': '🇰🇷', 'ARG': '🇦🇷', 'MEX': '🇲🇽'
                }[product.origin] || '';
                const originText = product.origin ? `${originFlag} ${product.origin}` : '';
                
                html += `
                    <div class="product-card" onclick="window.location.href='product-detail.html?id=${product.id}'">
                        <h3><i class="fas fa-tag"></i> ${escapeHtml(product.title)}</h3>
                        <p>${escapeHtml(product.description || 'Sin descripción')}</p>
                        <div class="price">${priceFormatted} ₲</div>
                        <div class="badge"><i class="fas fa-star"></i> ${conditionText}</div>
                        <div class="product-category"><i class="fas fa-tshirt"></i> ${product.category} | <i class="fas fa-ruler"></i> ${product.size || 'Talla única'}</div>
                        ${originText ? `<div class="product-origin"><i class="fas fa-globe-americas"></i> ${originText}</div>` : ''}
                    </div>
                `;
            }
            grid.innerHTML = html;
            renderPagination(totalPages);
        }
        
        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            let html = `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-double-left"></i></button>`;
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-left"></i></button>`;
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-right"></i></button>`;
            html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-double-right"></i></button>`;
            container.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            renderProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // ============================================================
        // CARGA DE PRODUCTOS
        // ============================================================
        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Cargando productos...</div>';
            try {
                const response = await fetch(`${API_URL}/api/products`);
                const data = await response.json();
                if (data.success && data.products && data.products.length > 0) {
                    allProducts = data.products;
                    renderProducts();
                } else {
                    grid.innerHTML = '<div class="loading"><i class="fas fa-box-open"></i> No hay productos disponibles</div>';
                    document.getElementById('pagination').innerHTML = '';
                }
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle"></i> Error al cargar productos: ${error.message}</div>`;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Eventos
        document.getElementById('enableDistanceBtn').addEventListener('click', getUserLocation);
        document.getElementById('distanceFilter')?.addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilters(); });
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('conditionFilter').addEventListener('change', applyFilters);
        document.getElementById('sizeFilter').addEventListener('input', applyFilters);
        document.getElementById('minPriceFilter').addEventListener('input', applyFilters);
        document.getElementById('maxPriceFilter').addEventListener('input', applyFilters);
        document.getElementById('originFilter').addEventListener('change', applyFilters);
        
        // ============================================================
        // INICIALIZACION
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            updateUserMenu();
            setupLogout();
            loadProducts();
            translatePage();
        });
