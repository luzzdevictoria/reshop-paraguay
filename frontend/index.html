<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReShop Paraguay - Ropa de Segunda Mano</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: #2A5C6E; color: white; padding: 15px; text-align: center; }
        .header a { color: white; text-decoration: none; margin: 0 10px; }
        .header a:hover { text-decoration: underline; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card h3 { color: #2A5C6E; margin-bottom: 10px; }
        .product-card p { color: #666; margin-bottom: 10px; }
        .price { color: #D95A41; font-size: 1.5rem; font-weight: bold; }
        .loading { text-align: center; padding: 50px; font-size: 1.2rem; color: #666; }
        .error { text-align: center; padding: 50px; font-size: 1.2rem; color: #D95A41; }
        .footer { background: #2A5C6E; color: white; text-align: center; padding: 15px; margin-top: 30px; }
        .badge { display: inline-block; background: #E8B86B; color: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-top: 8px; }
        .user-menu { display: inline-block; margin-left: 20px; }
        .user-menu span { margin-right: 10px; }
        .logout-btn { background: none; border: none; color: white; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍️ ReShop Paraguay</h1>
        <p>Shopping Virtual de Ropa de Segunda Mano</p>
        <div style="margin-top: 10px;">
            <a href="index.html">🏠 Inicio</a>
            <a href="cart.html">🛒 Carrito</a>
            <span id="authLinks">
                <a href="login.html">🔑 Iniciar Sesión</a>
                <a href="register.html">📝 Registrarse</a>
				<a href="dashboard-vendedor.html" id="dashboardLink" style="display: none;">📊 Mi Panel</a>
            </span>
            <span id="userMenu" style="display: none;" class="user-menu">
                <span>👤 <span id="userName"></span></span>
                <button id="logoutBtn" class="logout-btn">Cerrar Sesión</button>
            </span>
        </div>
    </div>
    
    <div class="container">
        <div class="products-grid" id="productsGrid">
            <div class="loading">Cargando productos...</div>
        </div>
    </div>

    <div class="footer">
        <p>Propietaria: Luciana Noelia Da Silva | Desarrollador: Pedro Jose Pirovani</p>
        <p>© 2026 ReShop Paraguay - Todos los derechos reservados</p>
    </div>

    <script>
        // ============================================================
        // FUNCIONES DE AUTENTICACION
        // ============================================================
        
        function updateUserMenu() {
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    const authLinks = document.getElementById('authLinks');
    const userMenu = document.getElementById('userMenu');
    const userName = document.getElementById('userName');
    const dashboardLink = document.getElementById('dashboardLink');

    if (token && user) {
        authLinks.style.display = 'none';
        userMenu.style.display = 'inline-block';
        userName.innerHTML = user.full_name || user.email;
        
        // Mostrar enlace al panel solo si es vendedor
        if (dashboardLink && user.role === 'seller') {
            dashboardLink.style.display = 'inline';
        }
    } else {
        authLinks.style.display = 'inline';
        userMenu.style.display = 'none';
        if (dashboardLink) dashboardLink.style.display = 'none';
    }
}

        // Configurar logout
        function setupLogout() {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                });
            }
        }

        // ============================================================
        // FUNCIONES DE PRODUCTOS
        // ============================================================

        const API_URL = 'https://reshop-backend.vercel.app';

        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            if (!grid) return;
            
            grid.innerHTML = '<div class="loading">Cargando productos...</div>';
            
            try {
                console.log('🔍 Cargando productos...');
                const response = await fetch(`${API_URL}/api/products`);
                const data = await response.json();
                console.log('📦 Datos recibidos:', data);
                
                if (data.success && data.products && data.products.length > 0) {
                    let html = '';
                    for (const product of data.products) {
                        const priceFormatted = new Intl.NumberFormat('es-PY').format(product.price);
                        const conditionText = {
                            'new_with_tags': 'Nuevo con etiqueta',
                            'new_without_tags': 'Nuevo sin etiqueta',
                            'very_good': 'Muy bueno',
                            'good': 'Bueno',
                            'acceptable': 'Aceptable'
                        }[product.condition] || product.condition;
                        
                        html += `
                        <div class="product-card" onclick="window.location.href='product-detail.html?id=${product.id}'">
                            <h3>${escapeHtml(product.title)}</h3>
                            <p>${escapeHtml(product.description || 'Sin descripción')}</p>
                            <div class="price">${priceFormatted} Gs</div>
                            <div class="badge">${conditionText}</div>
                            <div style="font-size:0.8rem; color:#888; margin-top:8px;">👕 ${product.category} | 📏 ${product.size || 'Talla única'}</div>
                        </div>
                        `;
                    }
                    grid.innerHTML = html;
                    console.log('✅ Productos renderizados correctamente');
                } else {
                    grid.innerHTML = '<div class="loading">📭 No hay productos disponibles</div>';
                }
            } catch (error) {
                console.error('❌ Error:', error);
                grid.innerHTML = `<div class="error">❌ Error al cargar productos: ${error.message}</div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // INICIALIZACION
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', () => {
            updateUserMenu();
            setupLogout();
            loadProducts();
        });
    </script>
</body>
</html>
