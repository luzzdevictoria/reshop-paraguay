<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - ReShop Paraguay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2A5C6E;
            --secondary: #E8B86B;
            --background: #F9F8F6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 32px;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 24px;
        }
        .logo h1 i {
            color: var(--secondary);
            margin-right: 8px;
        }
        h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #333;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 0.85rem;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn:hover { background: #1e4452; }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { text-decoration: underline; }
        .requirements {
            font-size: 0.75rem;
            color: #888;
            margin-top: 8px;
            text-align: left;
        }
        .loading-config {
            text-align: center;
            padding: 20px;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div class="logo">
            <h1><i class="fas fa-tshirt"></i> ReShop</h1>
        </div>
        
        <div id="mainContent">
            <!-- El contenido se muestra después de cargar la configuración -->
            <div class="loading-config">
                <i class="fas fa-spinner fa-pulse"></i> Cargando...
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Variables que se llenarán desde el backend
        let SUPABASE_URL = '';
        let SUPABASE_ANON_KEY = '';
        let supabase = null;
        
        // Elementos del DOM
        let mainContent = null;
        let passwordInput = null;
        let confirmInput = null;
        let resetBtn = null;
        let messageContainer = null;
        
        function showMessage(text, type) {
            if (!messageContainer) return;
            messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (messageContainer && messageContainer.innerHTML) {
                    messageContainer.innerHTML = '';
                }
            }, 5000);
        }
        
        function renderForm() {
            mainContent.innerHTML = `
                <h2>Nueva contraseña</h2>
                <p class="subtitle">Ingresa tu nueva contraseña para continuar</p>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Nueva contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres">
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" placeholder="Repite tu nueva contraseña">
                </div>
                
                <div class="requirements">
                    <i class="fas fa-info-circle"></i> La contraseña debe tener al menos 6 caracteres.
                </div>
                
                <button class="btn" id="resetBtn">
                    <i class="fas fa-save"></i> Actualizar contraseña
                </button>
                
                <div id="messageContainer"></div>
                
                <a href="login.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
                </a>
            `;
            
            // Asignar referencias después de renderizar
            passwordInput = document.getElementById('password');
            confirmInput = document.getElementById('confirmPassword');
            resetBtn = document.getElementById('resetBtn');
            messageContainer = document.getElementById('messageContainer');
            
            // Agregar event listeners
            if (resetBtn) {
                resetBtn.addEventListener('click', updatePassword);
            }
            if (passwordInput) {
                passwordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') updatePassword();
                });
            }
            if (confirmInput) {
                confirmInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') updatePassword();
                });
            }
            
            // Verificar token después de renderizar
            verifyAndSetSession();
        }
        
        function renderError(message) {
            mainContent.innerHTML = `
                <div class="message error" style="margin-top: 0;">${message}</div>
                <a href="login.html" class="back-link" style="margin-top: 20px;">
                    <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
                </a>
            `;
        }
        
        // Cargar configuración desde el backend
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const config = await response.json();
                SUPABASE_URL = config.supabaseUrl;
                SUPABASE_ANON_KEY = config.supabaseAnonKey;
                
                if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                    throw new Error('Configuración incompleta');
                }
                
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                return true;
            } catch (error) {
                console.error('Error cargando configuración:', error);
                renderError('Error al cargar la configuración. Por favor, intenta más tarde.');
                return false;
            }
        }
        
        // Verificar token al cargar la página
        async function verifyAndSetSession() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            
            if (!accessToken) {
                showMessage('Enlace inválido o expirado. Solicita un nuevo enlace de recuperación.', 'error');
                if (resetBtn) resetBtn.disabled = true;
                return false;
            }
            
            // Establecer la sesión con los tokens
            const { error } = await supabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            });
            
            if (error) {
                showMessage('El enlace ha expirado. Por favor, solicita uno nuevo.', 'error');
                if (resetBtn) resetBtn.disabled = true;
                return false;
            }
            
            return true;
        }
        
        // Actualizar contraseña
        async function updatePassword() {
            const password = passwordInput ? passwordInput.value.trim() : '';
            const confirm = confirmInput ? confirmInput.value.trim() : '';
            
            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres.', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('Las contraseñas no coinciden.', 'error');
                return;
            }
            
            if (resetBtn) {
                resetBtn.disabled = true;
                resetBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Actualizando...';
            }
            
            const { error } = await supabase.auth.updateUser({ password: password });
            
            if (error) {
                showMessage('Error: ' + error.message, 'error');
                if (resetBtn) {
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = '<i class="fas fa-save"></i> Actualizar contraseña';
                }
            } else {
                showMessage('✅ ¡Contraseña actualizada con éxito! Redirigiendo al login...', 'success');
                
                // Cerrar sesión
                await supabase.auth.signOut();
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        }
        
        // Inicializar
        async function init() {
            mainContent = document.getElementById('mainContent');
            
            const configLoaded = await loadConfig();
            if (configLoaded) {
                renderForm();
            }
        }
        
        init();
    </script>
</body>
</html>
